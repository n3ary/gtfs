name: "Daily multi-feed pipeline → binaries"

# Builds outputs/ and pushes to the `binaries` branch on success.
# Triggers: cron 00:30 UTC (after Transitous's ~00:00 UTC daily import)
# + manual workflow_dispatch.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLISH_BRANCH: binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: node src/pipeline/build-all.js
        env:
          STRICT: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate locally-built GTFS zips (canonical MobilityData validator)
        # Transitous-mirrored feeds are already validated upstream by Transitous;
        # we only validate the zips we BUILD ourselves (source.type=="build" in
        # feeds.json). Build fails on any ERROR-severity notice.
        run: |
          BUILT_IDS=$(jq -r '.feeds[] | select(.source.type=="build") | .id' outputs/feeds.json)
          if [ -z "$BUILT_IDS" ]; then
            echo "No locally-built feeds — skipping validator."
            exit 0
          fi

          VALIDATOR_URL=$(curl -sL https://api.github.com/repos/MobilityData/gtfs-validator/releases/latest \
            | jq -r '.assets[] | select(.name | test("cli\\.jar$")) | .browser_download_url')
          curl -sL -o /tmp/gtfs-validator.jar "$VALIDATOR_URL"
          test -s /tmp/gtfs-validator.jar || { echo "::error::validator jar download failed"; exit 1; }

          FAILED=0
          for id in $BUILT_IDS; do
            zip="outputs/feeds/$id.gtfs.zip"
            out="/tmp/gtfs-validator-out/$id"
            mkdir -p "$out"
            echo "::group::Validating $id"
            java -jar /tmp/gtfs-validator.jar -i "$zip" -o "$out" >/dev/null
            errors=$(jq '[.notices[] | select(.severity=="ERROR")] | length' "$out/report.json")
            warnings=$(jq '[.notices[] | select(.severity=="WARNING")] | length' "$out/report.json")
            echo "$id: ERROR=$errors WARNING=$warnings"
            echo "::endgroup::"
            if [ "$errors" -ne 0 ]; then
              echo "::error::$id has $errors validator ERRORs"
              jq '[.notices[] | select(.severity=="ERROR")][:3]' "$out/report.json"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Publish to ${{ env.PUBLISH_BRANCH }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          DIR="/tmp/$PUBLISH_BRANCH"

          if ! git clone --single-branch --branch "$PUBLISH_BRANCH" --depth 1 "$REMOTE" "$DIR" 2>/dev/null; then
            # First-ever build for this branch: create as orphan.
            git clone --depth 1 "$REMOTE" "$DIR"
            cd "$DIR"
            git checkout --orphan "$PUBLISH_BRANCH"
            git rm -rf . >/dev/null
            cd -
          fi

          cp -r outputs/* "$DIR/"
          cd "$DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to publish"
          else
            git commit -m "pipeline: $DATE"
            git push origin "$PUBLISH_BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
