name: Healthcheck gtfs-rt.n3ary.com

# Probes https://gtfs-rt.n3ary.com/healthz every 5 minutes. If the
# probe fails twice in a row (10 min of downtime), calls
# rebuild-gtfs-rt-vm to spin up a fresh VM and swap DNS.
#
# Failure tracking uses an actions/cache entry keyed by the VM host
# so the count survives between cron runs. Each run reads the count,
# increments it on failure, resets it on success, and triggers the
# rebuild only when count >= 2.
#
# Why two consecutive failures and not one:
#   - CF edge occasionally returns 5xx during cache rule / routing
#     changes, with no origin problem
#   - A 1-2 minute blip shouldn't burn a fresh VM
#   - Two cron runs (5 min apart) + a short backoff inside each run
#     means we tolerate up to ~5 min of true noise before escalating

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read  # to read the failure-count cache

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Restore previous failure count
        uses: actions/cache@v4
        with:
          path: .failure-count
          key: gtfs-rt-healthcheck-failure-count
          restore-keys: |
            gtfs-rt-healthcheck-failure-count-

      - name: Read failure count
        id: read
        run: |
          set -euo pipefail
          if [ -f .failure-count ]; then
            COUNT=$(cat .failure-count)
          else
            COUNT=0
          fi
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Probe gtfs-rt.n3ary.com/healthz
        id: probe
        run: |
          set -euo pipefail
          # Two backoff probes 30 s apart - tolerates CF edge blips
          # without false-positive triggering a rebuild.
          STATUS_1=$(curl -sS -o /dev/null -w '%{http_code}' \
            --max-time 10 \
            -H 'user-agent: gtfs-rt-healthcheck/1' \
            https://gtfs-rt.n3ary.com/healthz || echo 000)
          if [ "$STATUS_1" = "200" ]; then
            echo "first probe ok (200)"
            echo "status=200" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "first probe failed (${STATUS_1}); backing off 30 s"
          sleep 30
          STATUS_2=$(curl -sS -o /dev/null -w '%{http_code}' \
            --max-time 10 \
            -H 'user-agent: gtfs-rt-healthcheck/1' \
            https://gtfs-rt.n3ary.com/healthz || echo 000)
          echo "second probe returned ${STATUS_2}"
          echo "status=${STATUS_2}" >> "$GITHUB_OUTPUT"

      - name: Update failure count
        id: update
        env:
          PREV_COUNT: ${{ steps.read.outputs.count }}
          STATUS: ${{ steps.probe.outputs.status }}
        run: |
          set -euo pipefail
          if [ "$STATUS" = "200" ]; then
            echo "healthcheck ok; resetting failure count"
            echo "0" > .failure-count
            echo "action=reset" >> "$GITHUB_OUTPUT"
          else
            NEW_COUNT=$((PREV_COUNT + 1))
            echo "${NEW_COUNT}" > .failure-count
            echo "healthcheck failed (count=${NEW_COUNT})"
            echo "count=${NEW_COUNT}" >> "$GITHUB_OUTPUT"
            if [ "$NEW_COUNT" -ge 2 ]; then
              echo "action=trigger-rebuild" >> "$GITHUB_OUTPUT"
              echo "0" > .failure-count  # reset so we don't double-fire
            else
              echo "action=wait" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Persist failure count
        uses: actions/cache@v4
        with:
          path: .failure-count
          key: gtfs-rt-healthcheck-failure-count-${{ github.run_id }}
          # Force the cache to be rewritten so the new count is
          # available to the next run even if the cache key above
          # is treated as a new key.
        env:
          CACHE_HIT: ${{ steps.restore.outputs.cache-hit }}

      - name: Trigger VM rebuild
        if: steps.update.outputs.action == 'trigger-rebuild'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "consecutive failures detected; triggering rebuild-gtfs-rt-vm"
          gh workflow run rebuild-gtfs-rt-vm.yml \
            --repo '${{ github.repository }}' \
            -f reason='healthcheck 2 consecutive failures'